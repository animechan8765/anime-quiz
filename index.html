<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みんなのクイズパーク</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #2d2417;
      --paper: #fdf8f2;
      --accent: #e8640c;
      --accent2: #d4a017;
      --gold: #d4a017;
      --muted: #9c8b78;
      --card: #ffffff;
      --border: #e8ddd0;
      --surface: #f5ede3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 48px 20px 28px;
      background: linear-gradient(180deg, #fff8f0 0%, #fdf8f2 100%);
      border-bottom: 1px solid var(--border);
    }
    .site-title {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 0.01em;
      background: linear-gradient(135deg, #e8640c 0%, #d4a017 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 8px rgba(232,100,12,0.2));
    }
    .site-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* TOP */
    #top-page { max-width: 900px; margin: 0 auto; padding: 20px 20px 60px; }
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .quiz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .quiz-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .quiz-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(232,100,12,0.12); }
    .quiz-card:hover::before { opacity: 1; }
    .card-emoji { font-size: 2rem; margin-bottom: 10px; }
    .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--ink); }
    .card-meta { font-size: 0.73rem; color: var(--muted); }
    .card-badge {
      display: inline-block;
      font-size: 0.63rem;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 8px;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: rgba(232,100,12,0.1);
      color: var(--accent);
      border: 1px solid rgba(232,100,12,0.25);
    }
    .card-badge.hard { background: rgba(212,160,23,0.15); color: #b8860b; border-color: rgba(212,160,23,0.3); }
    .card-badge.easy { background: rgba(34,197,94,0.12); color: #16a34a; border-color: rgba(34,197,94,0.25); }

    /* QUIZ */
    #quiz-page { display: none; }
    .quiz-container { max-width: 680px; margin: 0 auto; padding: 20px 20px 60px; }
    .quiz-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .back-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      transition: all 0.15s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .quiz-title-bar { font-size: 1rem; font-weight: 700; }
    .progress-wrap { margin-bottom: 32px; }
    .progress-text { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(232,100,12,0.3);
    }
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 20px;
    }
    .question-number { font-size: 0.7rem; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 12px; font-weight: 700; text-transform: uppercase; }
    .question-text { font-size: clamp(1rem, 2.5vw, 1.15rem); line-height: 1.7; font-weight: 700; }
    .question-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .question-stat { font-size: 0.7rem; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .choice-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      line-height: 1.5;
      transition: all 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--ink);
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(232,100,12,0.06); }
    .choice-label { font-weight: 900; color: var(--accent); min-width: 18px; }
    .choice-btn.correct { border-color: #16a34a; background: rgba(34,197,94,0.08); color: #15803d; }
    .choice-btn.correct .choice-label { color: #16a34a; }
    .choice-btn.wrong { border-color: #dc2626; background: rgba(220,38,38,0.06); color: #dc2626; }
    .choice-btn:disabled { cursor: default; }
    .answer-feedback {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 4px;
      font-size: 0.88rem;
      line-height: 1.6;
      display: none;
    }
    .answer-feedback.show { display: block; }
    .answer-feedback.correct-fb { background: rgba(34,197,94,0.08); border: 1px solid #16a34a; color: #15803d; border-radius: 12px; }
    .answer-feedback.wrong-fb { background: rgba(220,38,38,0.06); border: 1px solid #dc2626; color: #dc2626; border-radius: 12px; }
    .next-btn {
      display: none;
      width: 100%;
      margin-top: 20px;
      background: linear-gradient(135deg, #e8640c, #d4a017);
      color: white;
      border: none;
      padding: 16px;
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .next-btn:hover { opacity: 0.85; }
    .next-btn.show { display: block; }

    /* RESULT */
    #result-page { display: none; }
    .result-container { max-width: 540px; margin: 0 auto; padding: 20px 20px 80px; text-align: center; }
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 32px;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .result-rank { font-family: 'Inter', sans-serif; font-size: 5rem; font-weight: 900; background: linear-gradient(135deg, #e8640c, #d4a017); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 4px; }
    .result-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 24px; }
    .result-score { font-size: 2.5rem; font-weight: 900; color: var(--ink); margin-bottom: 4px; }
    .result-score span { font-size: 1rem; color: var(--muted); font-weight: 400; }
    .result-message { margin-top: 16px; font-size: 0.9rem; color: var(--muted); line-height: 1.7; }
    .result-actions { display: flex; gap: 12px; margin-top: 32px; justify-content: center; flex-wrap: wrap; }
    .result-btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
    }
    .result-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; }
    .result-btn.primary:hover { opacity: 0.85; }
    .result-btn.secondary { background: var(--surface); color: var(--muted); }
    .result-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 500px) {
      .choices { grid-template-columns: 1fr; }
    }

    /* TABS */
    .tab-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 12px rgba(232,100,12,0.2); }
    .subtab-wrap {
      display: none;
      gap: 8px;
      margin-bottom: 16px;
    }
    .subtab-wrap.show { display: flex; }
    .subtab-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .subtab-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .subtab-btn.active { background: #d4a017; color: white; border-color: #d4a017; }

    .search-wrap {
      margin-bottom: 24px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      transition: all 0.15s;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,100,12,0.1); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
    }
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.95rem;
      display: none;
    }

    /* CREATE PAGE */
    #create-page { display: none; }
    .create-container { max-width: 680px; margin: 0 auto; padding: 20px 20px 60px; }
    .create-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .form-section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .form-section-title { font-size: 0.8rem; font-weight: 700; color: var(--accent); margin-bottom: 16px; letter-spacing: 0.1em; text-transform: uppercase; }
    .form-row { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.1em; }
    .form-input, .form-select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,100,12,0.1); }
    .question-block { border: 1.5px solid var(--border); border-radius: 3px; padding: 18px; margin-bottom: 12px; background: var(--paper); }
    .question-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .question-block-num { font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; }
    .remove-q-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; padding: 2px 6px; }
    .remove-q-btn:hover { color: var(--accent); }
    .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .choice-input-wrap { display: flex; align-items: center; gap: 6px; }
    .choice-radio { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
    .add-q-btn {
      width: 100%;
      padding: 12px;
      border: 2px dashed var(--border);
      border-radius: 3px;
      background: none;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 4px;
    }
    .add-q-btn:hover { border-color: var(--accent); color: var(--accent); }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      font-family: 'Zen Antique Soft', serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #a93226; }
    .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }
    .create-nav-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--ink);
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .create-nav-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,111,255,0.1); }
    /* SHARE DIALOG */
    .share-dialog-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }
    .share-dialog-overlay.show { display: flex; }
    .share-dialog {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 36px 32px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      position: relative;
    }
    .share-dialog-emoji { font-size: 3rem; margin-bottom: 12px; }
    .share-dialog-title {
      font-family: 'Zen Antique Soft', serif;
      font-size: 1.3rem;
      margin-bottom: 8px;
    }
    .share-dialog-msg {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .share-dialog-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .share-dialog-btn {
      padding: 10px 20px;
      border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid var(--ink);
    }
    .share-dialog-btn.twitter { background: #000; color: white; border-color: #000; }
    .share-dialog-btn.twitter:hover { background: #333; }
    .share-dialog-btn.skip { background: transparent; color: var(--muted); border-color: var(--border); }
    .share-dialog-btn.skip:hover { border-color: var(--ink); color: var(--ink); }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: var(--paper);
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* RANKING */
    .ranking-wrap { margin-top: 32px; }
    .ranking-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ranking-item:hover { border-color: var(--accent); transform: translateX(4px); background: var(--surface); }
    .ranking-num {
      font-family: 'Zen Antique Soft', serif;
      font-size: 1.4rem;
      color: var(--muted);
      min-width: 32px;
      text-align: center;
    }
    .ranking-num.gold { color: #d4a017; }
    .ranking-num.silver { color: #aaa; }
    .ranking-num.bronze { color: #cd7f32; }
    .ranking-info { flex: 1; }
    .ranking-title { font-weight: 700; font-size: 0.95rem; }
    .ranking-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .ranking-likes { font-size: 0.85rem; color: var(--accent); font-weight: 700; }

    /* RATING & SHARE */
    .rating-wrap, .share-wrap {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .rating-label {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .rating-btns { display: flex; gap: 12px; justify-content: center; }
    .rating-btn {
      padding: 10px 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--ink);
    }
    .rating-btn:hover { transform: scale(1.05); }
    .rating-btn.good:hover, .rating-btn.good.voted { border-color: #34d399; background: rgba(52,211,153,0.1); }
    .rating-btn.bad:hover, .rating-btn.bad.voted { border-color: var(--accent2); background: rgba(255,107,157,0.1); }
    .rating-btn:disabled { cursor: default; transform: none; }
    .share-btn {
      width: 100%;
      padding: 12px;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Nunito', 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .share-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <div class="site-title">みんなのクイズパーク</div>
  <div class="site-subtitle">MINNA NO QUIZ PARK</div>
  <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;">
    <button class="create-nav-btn" onclick="checkLoginAndCreate()">＋ クイズを投稿する</button>
    <button class="create-nav-btn" id="login-btn" onclick="signInWithGoogle()">🔑 Googleでログイン</button>
    <div id="user-info" style="display:none;align-items:center;gap:8px;">
      <span id="user-name" style="font-size:0.85rem;color:var(--muted);"></span>
      <button class="create-nav-btn" onclick="signOut()" style="padding:6px 12px;font-size:0.8rem;">ログアウト</button>
    </div>
  </div>
</header>

<div id="top-page">
  <div class="ranking-wrap" id="ranking-wrap" style="display:none;">
    <div class="section-label">👑 人気ランキング TOP10</div>
    <div id="ranking-list"></div>
  </div>

  <div class="section-label">クイズを選ぶ</div>

  <div class="tab-wrap">
    <button class="tab-btn active" onclick="setTab('all')">すべて</button>
    <button class="tab-btn" onclick="setTab('anime')">アニメ</button>
    <button class="tab-btn" onclick="setTab('game')">ゲーム</button>
    <button class="tab-btn" onclick="setTab('other')">その他</button>
  </div>

  <div class="subtab-wrap" id="subtab-wrap">
    <button class="subtab-btn active" onclick="setSubTab('official')">公式</button>
    <button class="subtab-btn" onclick="setSubTab('user')">みんなの投稿</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="アニメ名で検索（例：鬼滅、ナルト…）" oninput="filterQuiz()" />

async function sbFetch(path, options = {}) {
  const { data: { session } } = await sbClient.auth.getSession();
  const token = session?.access_token || SUPABASE_KEY;
  const res = await fetch(SUPABASE_URL + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.json();
    console.error('Supabase error:', JSON.stringify(err));
    throw err;
  }
  return res.json();
}

let questionCount = 0;

function addQuestion() {
  const list = document.getElementById('questions-list');

  questionCount++;
  const qid = questionCount;
  const div = document.createElement('div');
  div.className = 'question-block';
  div.dataset.qid = qid;
  div.innerHTML = `
    <div class="question-block-header">
      <span class="question-block-num">Q.${total + 1}</span>
      <button class="remove-q-btn" onclick="removeQuestion(${qid})">✕ 削除</button>

            <input class="form-input q-choice" type="text" placeholder="選択肢${i+1}" style="margin-bottom:0;" />
          </div>
        `).join('')}
      </div>
    </div>

      <label class="form-label">解説（任意）</label>
      <input class="form-input q-explanation" type="text" placeholder="正解の説明を入力" />
    </div>
  `;
  list.appendChild(div);
}

function removeQuestion(qid) {
  const block = document.querySelector(`.question-block[data-qid="${qid}"]`);
  if (block) block.remove();
  // 番号を振り直す
  document.querySelectorAll('.question-block').forEach((b, i) => {
    b.querySelector('.question-block-num').textContent = `Q.${i + 1}`;
  });
}

async function submitQuiz() {
  const title = document.getElementById('c-title').value.trim();
  const emoji = document.getElementById('c-emoji').value.trim() || '🎯';
  const difficulty = document.getElementById('c-difficulty').value;

  if (!title) { showToast('タイトルを入力してください'); return; }

  const blocks = document.querySelectorAll('.question-block');
  if (blocks.length < 3) { showToast('最低3問入力してください'); return; }

  const questions = [];
  let valid = true;

  blocks.forEach((block, i) => {
    const q = block.querySelector('.q-text').value.trim();
    const choices = [...block.querySelectorAll('.q-choice')].map(el => el.value.trim());
    const radioChecked = block.querySelector('.q-radio:checked');
    const explanation = block.querySelector('.q-explanation').value.trim();

    if (!q || choices.some(c => !c) || !radioChecked) {
      showToast(`Q.${i+1}：問題文・選択肢・正解をすべて入力してください`);
      valid = false;
      return;
    }
    questions.push({ q, choices, answer: parseInt(radioChecked.value), explanation });
  });

  if (!valid) return;

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '投稿中...';

  let data;
  try {
    data = await sbFetch('/rest/v1/quizzes', {
      method: 'POST',
      body: JSON.stringify({ title, emoji, difficulty, questions, user_id: currentUser ? currentUser.id : null, genre: document.getElementById('c-genre').value })
    });
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '投稿する 🎉';
    showToast('投稿に失敗しました: ' + (e.message || JSON.stringify(e)));
    console.error('Submit error:', e);
    return;
  }

  btn.disabled = false;
  btn.textContent = '投稿する 🎉';

  if (data && data[0] && data[0].id) {
    const quizTitle = title;
    const quizEmoji = emoji;
    showToast('投稿完了！ありがとうございます🎉');
    document.getElementById('c-title').value = '';
    document.getElementById('c-emoji').value = '';
    document.getElementById('questions-list').innerHTML = '';
    questionCount = 0;
    
    // シェアダイアログを表示
    showShareDialog(quizTitle, quizEmoji);
    setTimeout(() => { loadUserQuizzes(); }, 1000);
  } else {
    showToast('投稿に失敗しました。もう一度お試しください');
    console.error('Response:', JSON.stringify(data));
  }
}

let currentQuiz = null;
let currentIndex = 0;
let score = 0;
let answered = false;
const labels = ['A', 'B', 'C', 'D'];

function showPage(page) {
  document.getElementById('top-page').style.display = page === 'top' ? 'block' : 'none';
  document.getElementById('quiz-page').style.display = page === 'quiz' ? 'block' : 'none';
  document.getElementById('result-page').style.display = page === 'result' ? 'block' : 'none';
  document.getElementById('create-page').style.display = page === 'create' ? 'block' : 'none';
  if (page === 'create' && document.getElementById('questions-list').children.length === 0) {
    addQuestion(); addQuestion(); addQuestion();
  }
}

function renderTop() {
  const grid = document.getElementById('quiz-grid');
  const allQuizzes = [...quizData, ...userQuizzes];
  grid.innerHTML = allQuizzes.map(q => `
    <div class="quiz-card" onclick="startQuiz('${q.id}')">
      <div class="card-emoji">${q.emoji}</div>
      <div class="card-title">${q.title}${q.isUserQuiz ? ' <span style=\"font-size:0.6rem;background:#e8f4fd;color:#2980b9;padding:1px 6px;border-radius:2px;vertical-align:middle;\">投稿</span>' : ''}</div>
      <div class="card-meta">${q.questions.length}問${q.isUserQuiz && q.play_count ? ' · ' + q.play_count + '回プレイ' : ''}</div>
      <div class="card-badge ${q.difficulty}">${q.difficulty === 'easy' ? '初級' : q.difficulty === 'hard' ? '上級' : '中級'}</div>
      ${q.isUserQuiz && currentUser && q.user_id === currentUser.id ? `<button onclick="event.stopPropagation();deleteQuiz('${q.id}')" style="margin-top:8px;background:none;border:1px solid var(--accent);color:var(--accent);font-size:0.7rem;padding:2px 8px;border-radius:2px;cursor:pointer;">🗑 削除</button>` : ''}
    </div>
  `).join('');
}

async function startQuiz(id) {
  const allQuizzes = [...quizData, ...userQuizzes];
  currentQuiz = allQuizzes.find(q => q.id === id);
  currentIndex = 0;
  score = 0;
  showPage('quiz');
  document.getElementById('quiz-title-bar').textContent = currentQuiz.emoji + ' ' + currentQuiz.title;
  renderQuestion();

  // play_countを増やす（投稿クイズのみ）
  if (currentQuiz.isUserQuiz) {
    const rid = currentQuiz.id.replace('user_', '');
    sbFetch(`/rest/v1/quizzes?id=eq.${rid}`, {
      method: 'PATCH',
      body: JSON.stringify({ play_count: (currentQuiz.play_count || 0) + 1 })
    }).catch(() => {});
  }
}

function renderQuestion() {
  answered = false;
  const q = currentQuiz.questions[currentIndex];
  const total = currentQuiz.questions.length;

  document.getElementById('question-number').textContent = `Q.${currentIndex + 1}`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('progress-text').textContent = `問題 ${currentIndex + 1} / ${total}`;
  document.getElementById('score-text').textContent = `${score}点`;
  document.getElementById('progress-fill').style.width = `${(currentIndex / total) * 100}%`;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = q.choices.map((c, i) => `
    <button class="choice-btn" onclick="selectAnswer(${i})">
      <span class="choice-label">${labels[i]}</span>
      <span>${c}</span>
    </button>
  `).join('');

  const fb = document.getElementById('answer-feedback');
  fb.className = 'answer-feedback';
  fb.textContent = '';

  // 正解率を右上に表示（投稿クイズのみ）
  const statEl = document.getElementById('question-stat');
  statEl.style.display = 'none';
  statEl.textContent = '';
  if (currentQuiz.isUserQuiz) {
    loadQuestionStat(currentQuiz.id, currentIndex);
  }

  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = currentIndex + 1 === total ? '結果を見る 🎉' : '次の問題へ →';
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q = currentQuiz.questions[currentIndex];
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(btn => btn.disabled = true);

  if (index === q.answer) {
    score++;
    buttons[index].classList.add('correct');
    const fb = document.getElementById('answer-feedback');
    fb.className = 'answer-feedback correct-fb show';
    fb.innerHTML = `✅ 正解！　${q.explanation}`;
  } else {
    buttons[index].classList.add('wrong');
    buttons[q.answer].classList.add('correct');
    const fb = document.getElementById('answer-feedback');
    fb.className = 'answer-feedback wrong-fb show';
    fb.innerHTML = `❌ 不正解…　正解は「${q.choices[q.answer]}」です。<br>${q.explanation}`;
  }

  document.getElementById('score-text').textContent = `${score}点`;
  document.getElementById('next-btn').classList.add('show');

  // 正解率を記録（投稿クイズのみ）
  if (currentQuiz.isUserQuiz) {
    recordQuestionStat(currentQuiz.id, currentIndex, index === q.answer);
  }
}

async function loadQuestionStat(quizId, qIndex) {
  const rid = quizId.replace('user_', '');
  try {
    const data = await sbFetch(`/rest/v1/question_stats?quiz_id=eq.${rid}&question_index=eq.${qIndex}&select=correct_count,total_count`);
    if (data && data.length > 0) {
      const row = data[0];
      if (row.total_count > 0) {
        const pct = Math.round((row.correct_count / row.total_count) * 100);
        const statEl = document.getElementById('question-stat');
        statEl.textContent = `正解率 ${pct}%`;
        statEl.style.display = 'inline-block';
      }
    }
  } catch(e) {}
}

async function loadAndShowStat(fbEl, quizId, qIndex, isCorrect) {
  const rid = quizId.replace('user_', '');
  try {
    const existing = await sbFetch(`/rest/v1/question_stats?quiz_id=eq.${rid}&question_index=eq.${qIndex}&select=correct_count,total_count`);
    if (existing && existing.length > 0) {
      const row = existing[0];
      const total = row.total_count + 1;
      const correct = row.correct_count + (isCorrect ? 1 : 0);
      const pct = Math.round((correct / total) * 100);
      fbEl.innerHTML += `<br><span style="font-size:0.78rem;opacity:0.7;">📊 みんなの正解率：${pct}%（${total}回回答）</span>`;
    }
  } catch(e) {}
}

async function recordQuestionStat(quizId, qIndex, isCorrect) {
  const rid = quizId.replace('user_', '');
  // 既存レコードを検索
  try {
    const existing = await sbFetch(`/rest/v1/question_stats?quiz_id=eq.${rid}&question_index=eq.${qIndex}&select=id,correct_count,total_count`);
    if (existing && existing.length > 0) {
      const row = existing[0];
      await sbFetch(`/rest/v1/question_stats?id=eq.${row.id}`, {
        method: 'PATCH',
        body: JSON.stringify({
          correct_count: row.correct_count + (isCorrect ? 1 : 0),
          total_count: row.total_count + 1
        })
      });
    } else {
      await sbFetch('/rest/v1/question_stats', {
        method: 'POST',
        body: JSON.stringify({
          quiz_id: rid,
          question_index: qIndex,
          correct_count: isCorrect ? 1 : 0,
          total_count: 1
        })
      });
    }
  } catch(e) { console.error('stat error:', e); }
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuiz.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  showPage('result');
  const total = currentQuiz.questions.length;
  const pct = score / total;

  let rank, msg;
  if (pct === 1)       { rank = 'S'; msg = '完璧です！真のアニメ通ですね👑'; }
  else if (pct >= 0.8) { rank = 'A'; msg = 'すごい！かなりの知識量です🔥'; }
  else if (pct >= 0.6) { rank = 'B'; msg = 'なかなかの実力！もう少しで上位ランク✨'; }
  else if (pct >= 0.4) { rank = 'C'; msg = '半分以上はクリア！復習してリベンジを💪'; }
  else                 { rank = 'D'; msg = '作品を見返してリトライしよう！📺'; }

  document.getElementById('result-rank').textContent = rank;
  document.getElementById('result-score').innerHTML = `${score} <span>/ ${total}問正解</span>`;
  document.getElementById('result-message').textContent = msg;
  document.getElementById('progress-fill').style.width = '100%';

  // グッド/バッドリセット
  hasRated = false;
  document.getElementById('good-btn').disabled = false;
  document.getElementById('bad-btn').disabled = false;
  document.getElementById('good-btn').classList.remove('voted');
  document.getElementById('bad-btn').classList.remove('voted');
  document.getElementById('good-count').textContent = currentQuiz.likes || 0;
  document.getElementById('bad-count').textContent = currentQuiz.dislikes || 0;
}

function retryQuiz() { startQuiz(currentQuiz.id); }
function goTop() { showPage('top'); loadUserQuizzes(); }

// ===== グッド/バッド評価 =====
let hasRated = false;

async function rateQuiz(type) {
  if (hasRated) { showToast('すでに評価済みです'); return; }
  if (!currentQuiz.isUserQuiz) {
    // 組み込みクイズはローカルでカウント
    showToast(type === 'good' ? '👍 ありがとうございます！' : '👎 フィードバックありがとうございます！');
    hasRated = true;
    document.getElementById('good-btn').classList.toggle('voted', type === 'good');
    document.getElementById('bad-btn').classList.toggle('voted', type === 'bad');
    document.getElementById('good-btn').disabled = true;
    document.getElementById('bad-btn').disabled = true;
    return;
  }

  const id = currentQuiz.id.replace('user_', '');
  const field = type === 'good' ? 'likes' : 'dislikes';
  const current = type === 'good' ? currentQuiz.likes || 0 : currentQuiz.dislikes || 0;

  try {
    await sbFetch(`/rest/v1/quizzes?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ [field]: current + 1 })
    });
    hasRated = true;
    if (type === 'good') {
      document.getElementById('good-count').textContent = current + 1;
      document.getElementById('good-btn').classList.add('voted');
    } else {
      document.getElementById('bad-count').textContent = current + 1;
      document.getElementById('bad-btn').classList.add('voted');
    }
    document.getElementById('good-btn').disabled = true;
    document.getElementById('bad-btn').disabled = true;
    showToast(type === 'good' ? '👍 ありがとうございます！' : '👎 フィードバックありがとうございます！');
  } catch(e) {
    showToast('評価に失敗しました');
  }
}

function shareResult() {
  const total = currentQuiz.questions.length;
  const rank = document.getElementById('result-rank').textContent;
  const text = `「${currentQuiz.emoji} ${currentQuiz.title}」クイズに挑戦！
${score}/${total}問正解でランク${rank}でした🎉

あなたも挑戦してみて👇
https://animechan8765.github.io/anime-quiz/`;
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

let currentTab = 'all';
let currentSubTab = 'official';

function setTab(tab) {
  currentTab = tab;
  currentSubTab = 'official';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const subtabWrap = document.getElementById('subtab-wrap');
  if (tab !== 'all') {
    subtabWrap.classList.add('show');
    document.querySelectorAll('.subtab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.subtab-btn')[0].classList.add('active');
  } else {
    subtabWrap.classList.remove('show');
  }
  filterQuiz();
}

function setSubTab(subtab) {
  currentSubTab = subtab;
  document.querySelectorAll('.subtab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  filterQuiz();
}

function filterQuiz() {
  const word = document.getElementById('search-input').value.trim().toLowerCase();
  const grid = document.getElementById('quiz-grid');
  const noResults = document.getElementById('no-results');
  const noResultsWord = document.getElementById('no-results-word');

  let quizzes = [...quizData, ...userQuizzes];

  if (currentTab !== 'all') {
    quizzes = quizzes.filter(q => q.genre === currentTab);
    if (currentSubTab === 'official') {
      quizzes = quizzes.filter(q => !q.isUserQuiz);
    } else {
      quizzes = quizzes.filter(q => q.isUserQuiz);
    }
  }

  const filtered = word ? quizzes.filter(q => q.title.toLowerCase().includes(word)) : quizzes;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResultsWord.textContent = word || currentTab;
    noResults.style.display = 'block';
  } else {
    noResults.style.display = 'none';
    grid.innerHTML = filtered.map(q => `
      <div class="quiz-card" onclick="startQuiz('${q.id}')">
        <div class="card-emoji">${q.emoji}</div>
        <div class="card-title">${q.title}${q.isUserQuiz ? ' <span style=\"font-size:0.6rem;background:rgba(232,100,12,0.1);color:var(--accent);padding:1px 6px;border-radius:4px;vertical-align:middle;\">投稿</span>' : ''}</div>
        <div class="card-meta">${q.questions.length}問${q.isUserQuiz && q.play_count ? ' · ' + q.play_count + '回プレイ' : ''}</div>
        <div class="card-badge ${q.difficulty}">${q.difficulty === 'easy' ? '初級' : q.difficulty === 'hard' ? '上級' : '中級'}</div>
        ${q.isUserQuiz && currentUser && q.user_id === currentUser.id ? `<button onclick="event.stopPropagation();deleteQuiz('${q.id}')" style="margin-top:8px;background:none;border:1px solid var(--accent);color:var(--accent);font-size:0.7rem;padding:2px 8px;border-radius:4px;cursor:pointer;">🗑 削除</button>` : ''}
      </div>
    `).join('');
  }
}

async function deleteQuiz(id) {
  if (!currentUser) { showToast('ログインが必要です'); return; }
  if (!confirm('このクイズを削除しますか？')) return;
  const rid = id.replace('user_', '');
  const { data: { session } } = await sbClient.auth.getSession();
  const token = session?.access_token || SUPABASE_KEY;
  try {
    await fetch(SUPABASE_URL + `/rest/v1/quizzes?id=eq.${rid}&user_id=eq.${currentUser.id}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
      }
    });
    showToast('削除しました！');
    loadUserQuizzes();
  } catch(e) {
    showToast('削除に失敗しました');
  }
}

renderTop();
showPage('top');
loadUserQuizzes();
initAuth();
