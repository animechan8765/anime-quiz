<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アニメクイズ道場</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1208;
      --paper: #f5efe0;
      --accent: #c0392b;
      --accent2: #e67e22;
      --gold: #d4a017;
      --muted: #7a6a50;
      --card: #fdf8ee;
      --border: #c8b89a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,160,120,0.15) 39px, rgba(180,160,120,0.15) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,160,120,0.08) 39px, rgba(180,160,120,0.08) 40px);
    }
    header {
      text-align: center;
      padding: 40px 20px 20px;
    }
    header::after {
      content: '';
      display: block;
      width: 80px;
      height: 4px;
      background: var(--accent);
      margin: 16px auto 0;
      border-radius: 2px;
    }
    .site-title {
      font-family: 'Zen Antique Soft', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--ink);
      letter-spacing: 0.1em;
      text-shadow: 3px 3px 0 rgba(192,57,43,0.15);
    }
    .site-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.2em;
    }

    /* TOP */
    #top-page { max-width: 900px; margin: 0 auto; padding: 20px 20px 60px; }
    .section-label {
      font-family: 'Zen Antique Soft', serif;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .quiz-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 24px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .quiz-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 5px; height: 100%;
      background: var(--accent);
      transform: scaleY(0);
      transition: transform 0.2s ease;
      transform-origin: bottom;
    }
    .quiz-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 4px 6px 0 rgba(192,57,43,0.12); }
    .quiz-card:hover::before { transform: scaleY(1); }
    .card-emoji { font-size: 2.2rem; margin-bottom: 10px; }
    .card-title { font-family: 'Zen Antique Soft', serif; font-size: 1.1rem; margin-bottom: 6px; }
    .card-meta { font-size: 0.75rem; color: var(--muted); }
    .card-badge {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 2px;
      margin-top: 8px;
      letter-spacing: 0.1em;
    }
    .card-badge.hard { background: var(--ink); }
    .card-badge.easy { background: #27ae60; }

    /* QUIZ */
    #quiz-page { display: none; }
    .quiz-container { max-width: 680px; margin: 0 auto; padding: 20px 20px 60px; }
    .quiz-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .back-btn {
      background: none;
      border: 2px solid var(--border);
      padding: 6px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      transition: all 0.15s;
    }
    .back-btn:hover { border-color: var(--ink); color: var(--ink); }
    .quiz-title-bar { font-family: 'Zen Antique Soft', serif; font-size: 1.1rem; }
    .progress-wrap { margin-bottom: 32px; }
    .progress-text { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .question-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 32px 28px;
      margin-bottom: 20px;
    }
    .question-number { font-size: 0.72rem; color: var(--accent); letter-spacing: 0.2em; margin-bottom: 12px; font-weight: 700; }
    .question-text { font-size: clamp(1rem, 2.5vw, 1.2rem); line-height: 1.7; font-weight: 700; }
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .choice-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      line-height: 1.5;
      transition: all 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff8f0; }
    .choice-label { font-weight: 900; color: var(--accent); min-width: 18px; }
    .choice-btn.correct { border-color: #27ae60; background: #eafaf1; color: #1a6b3a; }
    .choice-btn.correct .choice-label { color: #27ae60; }
    .choice-btn.wrong { border-color: var(--accent); background: #fdecea; color: #8b1a0a; }
    .choice-btn:disabled { cursor: default; }
    .answer-feedback {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 4px;
      font-size: 0.88rem;
      line-height: 1.6;
      display: none;
    }
    .answer-feedback.show { display: block; }
    .answer-feedback.correct-fb { background: #eafaf1; border: 1.5px solid #27ae60; color: #1a6b3a; }
    .answer-feedback.wrong-fb { background: #fdecea; border: 1.5px solid var(--accent); color: #8b1a0a; }
    .next-btn {
      display: none;
      width: 100%;
      margin-top: 20px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 16px;
      font-family: 'Zen Antique Soft', serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .next-btn:hover { background: var(--accent); }
    .next-btn.show { display: block; }

    /* RESULT */
    #result-page { display: none; }
    .result-container { max-width: 540px; margin: 0 auto; padding: 20px 20px 80px; text-align: center; }
    .result-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 48px 32px;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
    }
    .result-rank { font-family: 'Zen Antique Soft', serif; font-size: 5rem; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .result-label { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.2em; margin-bottom: 24px; }
    .result-score { font-size: 2.5rem; font-weight: 900; color: var(--ink); margin-bottom: 4px; }
    .result-score span { font-size: 1rem; color: var(--muted); font-weight: 400; }
    .result-message { margin-top: 16px; font-size: 0.95rem; color: var(--muted); line-height: 1.7; }
    .result-actions { display: flex; gap: 12px; margin-top: 32px; justify-content: center; flex-wrap: wrap; }
    .result-btn {
      padding: 12px 24px;
      border-radius: 4px;
      font-family: 'Zen Antique Soft', serif;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid var(--ink);
    }
    .result-btn.primary { background: var(--ink); color: var(--paper); }
    .result-btn.primary:hover { background: var(--accent); border-color: var(--accent); }
    .result-btn.secondary { background: transparent; color: var(--ink); }
    .result-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 500px) {
      .choices { grid-template-columns: 1fr; }
    }

    .search-wrap {
      margin-bottom: 24px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border: 2px solid var(--border);
      border-radius: 4px;
      background: var(--card);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      transition: border-color 0.15s;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
    }
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.95rem;
      display: none;
    }

    /* CREATE PAGE */
    #create-page { display: none; }
    .create-container { max-width: 680px; margin: 0 auto; padding: 20px 20px 60px; }
    .create-header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .form-section { background: var(--card); border: 2px solid var(--border); border-radius: 4px; padding: 28px; margin-bottom: 20px; }
    .form-section-title { font-family: 'Zen Antique Soft', serif; font-size: 1rem; color: var(--accent); margin-bottom: 16px; letter-spacing: 0.1em; }
    .form-row { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.1em; }
    .form-input, .form-select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 3px;
      background: var(--paper);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .question-block { border: 1.5px solid var(--border); border-radius: 3px; padding: 18px; margin-bottom: 12px; background: var(--paper); }
    .question-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .question-block-num { font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; }
    .remove-q-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; padding: 2px 6px; }
    .remove-q-btn:hover { color: var(--accent); }
    .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .choice-input-wrap { display: flex; align-items: center; gap: 6px; }
    .choice-radio { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
    .add-q-btn {
      width: 100%;
      padding: 12px;
      border: 2px dashed var(--border);
      border-radius: 3px;
      background: none;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 4px;
    }
    .add-q-btn:hover { border-color: var(--accent); color: var(--accent); }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      font-family: 'Zen Antique Soft', serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #a93226; }
    .submit-btn:disabled { background: var(--muted); cursor: not-allowed; }
    .create-nav-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 20px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      background: none;
      color: var(--accent);
      font-family: 'Zen Antique Soft', serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.1em;
    }
    .create-nav-btn:hover { background: var(--accent); color: white; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: var(--paper);
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="site-title">アニメクイズ道場</div>
  <div class="site-subtitle">ANIME QUIZ DOJO</div>
  <button class="create-nav-btn" onclick="showPage('create')" style="margin-top:16px;">＋ クイズを投稿する</button>
</header>

<div id="top-page">
  <div class="section-label">クイズを選ぶ</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="アニメ名で検索（例：鬼滅、ナルト…）" oninput="filterQuiz()" />
  </div>
  <div class="quiz-grid" id="quiz-grid"></div>
  <div class="no-results" id="no-results">「<span id="no-results-word"></span>」に一致するクイズが見つかりませんでした😢</div>
</div>

<div id="quiz-page">
  <div class="quiz-container">
    <div class="quiz-header">
      <button class="back-btn" onclick="goTop()">← もどる</button>
      <div class="quiz-title-bar" id="quiz-title-bar"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-text">
        <span id="progress-text">問題 1 / 10</span>
        <span id="score-text">0点</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="question-card">
      <div class="question-number" id="question-number">Q.1</div>
      <div class="question-text" id="question-text"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="answer-feedback" id="answer-feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
  </div>
</div>

<div id="result-page">
  <div class="result-container">
    <div class="result-card">
      <div class="result-rank" id="result-rank">S</div>
      <div class="result-label">RANK</div>
      <div class="result-score" id="result-score">10 <span>/ 10問正解</span></div>
      <div class="result-message" id="result-message"></div>
      <div class="result-actions">
        <button class="result-btn primary" onclick="retryQuiz()">もう一度挑戦</button>
        <button class="result-btn secondary" onclick="goTop()">クイズ一覧へ</button>
      </div>
    </div>
  </div>
</div>

<!-- 投稿ページ -->
<div id="create-page">
  <div class="create-container">
    <div class="create-header">
      <button class="back-btn" onclick="showPage('top')">← もどる</button>
      <div class="quiz-title-bar">クイズを投稿する</div>
    </div>

    <div class="form-section">
      <div class="form-section-title">基本情報</div>
      <div class="form-row">
        <label class="form-label">アニメタイトル *</label>
        <input class="form-input" id="c-title" type="text" placeholder="例：進撃の巨人" />
      </div>
      <div class="form-row">
        <label class="form-label">絵文字（任意）</label>
        <input class="form-input" id="c-emoji" type="text" placeholder="例：⚔️" maxlength="2" style="max-width:80px;" />
      </div>
      <div class="form-row">
        <label class="form-label">難易度</label>
        <select class="form-select" id="c-difficulty" style="max-width:160px;">
          <option value="easy">初級</option>
          <option value="normal" selected>中級</option>
          <option value="hard">上級</option>
        </select>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">問題（最低3問・最大10問）</div>
      <div id="questions-list"></div>
      <button class="add-q-btn" onclick="addQuestion()">＋ 問題を追加する</button>
    </div>

    <button class="submit-btn" onclick="submitQuiz()">投稿する 🎉</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Supabase設定
const SUPABASE_URL = 'https://bydazkjcltnemwyyazjd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5ZGF6a2pjbHRuZW13eXlhempkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODYyNDQsImV4cCI6MjA5NDM2MjI0NH0.fIXUJrkAvdnO1_DebLDK8X-GEB4uc7J8gOtSQon7s8k';

async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.json();
    console.error('Supabase error:', JSON.stringify(err));
    throw err;
  }
  return res.json();
}

// ===== 投稿フォーム =====
let questionCount = 0;

function addQuestion() {
  const list = document.getElementById('questions-list');
  const total = list.querySelectorAll('.question-block').length;
  if (total >= 10) { showToast('問題は最大10問までです'); return; }
  
  questionCount++;
  const qid = questionCount;
  const div = document.createElement('div');
  div.className = 'question-block';
  div.dataset.qid = qid;
  div.innerHTML = `
    <div class="question-block-header">
      <span class="question-block-num">Q.${total + 1}</span>
      <button class="remove-q-btn" onclick="removeQuestion(${qid})">✕ 削除</button>
    </div>
    <div class="form-row">
      <label class="form-label">問題文 *</label>
      <input class="form-input q-text" type="text" placeholder="例：主人公の名前は？" />
    </div>
    <div class="form-row">
      <label class="form-label">選択肢（正解をラジオボタンで選ぶ）*</label>
      <div class="choices-grid">
        ${[0,1,2,3].map(i => `
          <div class="choice-input-wrap">
            <input type="radio" class="choice-radio q-radio" name="correct-${qid}" value="${i}" />
            <input class="form-input q-choice" type="text" placeholder="選択肢${i+1}" style="margin-bottom:0;" />
          </div>
        `).join('')}
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">解説（任意）</label>
      <input class="form-input q-explanation" type="text" placeholder="正解の説明を入力" />
    </div>
  `;
  list.appendChild(div);
}

function removeQuestion(qid) {
  const block = document.querySelector(`.question-block[data-qid="${qid}"]`);
  if (block) block.remove();
  // 番号を振り直す
  document.querySelectorAll('.question-block').forEach((b, i) => {
    b.querySelector('.question-block-num').textContent = `Q.${i + 1}`;
  });
}

async function submitQuiz() {
  const title = document.getElementById('c-title').value.trim();
  const emoji = document.getElementById('c-emoji').value.trim() || '🎯';
  const difficulty = document.getElementById('c-difficulty').value;

  if (!title) { showToast('タイトルを入力してください'); return; }

  const blocks = document.querySelectorAll('.question-block');
  if (blocks.length < 3) { showToast('最低3問入力してください'); return; }

  const questions = [];
  let valid = true;

  blocks.forEach((block, i) => {
    const q = block.querySelector('.q-text').value.trim();
    const choices = [...block.querySelectorAll('.q-choice')].map(el => el.value.trim());
    const radioChecked = block.querySelector('.q-radio:checked');
    const explanation = block.querySelector('.q-explanation').value.trim();

    if (!q || choices.some(c => !c) || !radioChecked) {
      showToast(`Q.${i+1}：問題文・選択肢・正解をすべて入力してください`);
      valid = false;
      return;
    }
    questions.push({ q, choices, answer: parseInt(radioChecked.value), explanation });
  });

  if (!valid) return;

  const btn = document.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '投稿中...';

  let data;
  try {
    data = await sbFetch('/rest/v1/quizzes', {
      method: 'POST',
      body: JSON.stringify({ title, emoji, difficulty, questions })
    });
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '投稿する 🎉';
    showToast('投稿に失敗しました: ' + (e.message || JSON.stringify(e)));
    console.error('Submit error:', e);
    return;
  }

  btn.disabled = false;
  btn.textContent = '投稿する 🎉';

  if (data && data[0] && data[0].id) {
    showToast('投稿完了！ありがとうございます🎉');
    document.getElementById('c-title').value = '';
    document.getElementById('c-emoji').value = '';
    document.getElementById('questions-list').innerHTML = '';
    questionCount = 0;
    setTimeout(() => { showPage('top'); loadUserQuizzes(); }, 2000);
  } else {
    showToast('投稿に失敗しました。もう一度お試しください');
    console.error('Response:', JSON.stringify(data));
  }
}

let userQuizzes = [];

async function loadUserQuizzes() {
  const data = await sbFetch('/rest/v1/quizzes?select=*&order=created_at.desc');
  if (Array.isArray(data)) {
    userQuizzes = data.map(q => ({
      id: 'user_' + q.id,
      title: q.title,
      emoji: q.emoji || '🎯',
      difficulty: q.difficulty || 'normal',
      questions: q.questions,
      isUserQuiz: true
    }));
    renderTop();
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

let currentQuiz = null;
let currentIndex = 0;
let score = 0;
let answered = false;
const labels = ['A', 'B', 'C', 'D'];

function showPage(page) {
  document.getElementById('top-page').style.display = page === 'top' ? 'block' : 'none';
  document.getElementById('quiz-page').style.display = page === 'quiz' ? 'block' : 'none';
  document.getElementById('result-page').style.display = page === 'result' ? 'block' : 'none';
  document.getElementById('create-page').style.display = page === 'create' ? 'block' : 'none';
  if (page === 'create' && document.getElementById('questions-list').children.length === 0) {
    addQuestion(); addQuestion(); addQuestion();
  }
}

function renderTop() {
  const grid = document.getElementById('quiz-grid');
  const allQuizzes = [...quizData, ...userQuizzes];
  grid.innerHTML = allQuizzes.map(q => `
    <div class="quiz-card" onclick="startQuiz('${q.id}')">
      <div class="card-emoji">${q.emoji}</div>
      <div class="card-title">${q.title}${q.isUserQuiz ? ' <span style=\"font-size:0.6rem;background:#e8f4fd;color:#2980b9;padding:1px 6px;border-radius:2px;vertical-align:middle;\">投稿</span>' : ''}</div>
      <div class="card-meta">${q.questions.length}問</div>
      <div class="card-badge ${q.difficulty}">${q.difficulty === 'easy' ? '初級' : q.difficulty === 'hard' ? '上級' : '中級'}</div>
    </div>
  `).join('');
}

function startQuiz(id) {
  currentQuiz = quizData.find(q => q.id === id);
  currentIndex = 0;
  score = 0;
  showPage('quiz');
  document.getElementById('quiz-title-bar').textContent = currentQuiz.emoji + ' ' + currentQuiz.title;
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = currentQuiz.questions[currentIndex];
  const total = currentQuiz.questions.length;

  document.getElementById('question-number').textContent = `Q.${currentIndex + 1}`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('progress-text').textContent = `問題 ${currentIndex + 1} / ${total}`;
  document.getElementById('score-text').textContent = `${score}点`;
  document.getElementById('progress-fill').style.width = `${(currentIndex / total) * 100}%`;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = q.choices.map((c, i) => `
    <button class="choice-btn" onclick="selectAnswer(${i})">
      <span class="choice-label">${labels[i]}</span>
      <span>${c}</span>
    </button>
  `).join('');

  const fb = document.getElementById('answer-feedback');
  fb.className = 'answer-feedback';
  fb.textContent = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = currentIndex + 1 === total ? '結果を見る 🎉' : '次の問題へ →';
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q = currentQuiz.questions[currentIndex];
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(btn => btn.disabled = true);

  if (index === q.answer) {
    score++;
    buttons[index].classList.add('correct');
    const fb = document.getElementById('answer-feedback');
    fb.className = 'answer-feedback correct-fb show';
    fb.innerHTML = `✅ 正解！　${q.explanation}`;
  } else {
    buttons[index].classList.add('wrong');
    buttons[q.answer].classList.add('correct');
    const fb = document.getElementById('answer-feedback');
    fb.className = 'answer-feedback wrong-fb show';
    fb.innerHTML = `❌ 不正解…　正解は「${q.choices[q.answer]}」です。<br>${q.explanation}`;
  }

  document.getElementById('score-text').textContent = `${score}点`;
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuiz.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  showPage('result');
  const total = currentQuiz.questions.length;
  const pct = score / total;

  let rank, msg;
  if (pct === 1)       { rank = 'S'; msg = '完璧です！真のアニメ通ですね👑'; }
  else if (pct >= 0.8) { rank = 'A'; msg = 'すごい！かなりの知識量です🔥'; }
  else if (pct >= 0.6) { rank = 'B'; msg = 'なかなかの実力！もう少しで上位ランク✨'; }
  else if (pct >= 0.4) { rank = 'C'; msg = '半分以上はクリア！復習してリベンジを💪'; }
  else                 { rank = 'D'; msg = '作品を見返してリトライしよう！📺'; }

  document.getElementById('result-rank').textContent = rank;
  document.getElementById('result-score').innerHTML = `${score} <span>/ ${total}問正解</span>`;
  document.getElementById('result-message').textContent = msg;
  document.getElementById('progress-fill').style.width = '100%';
}

function retryQuiz() { startQuiz(currentQuiz.id); }
function goTop() { showPage('top'); }

function filterQuiz() {
  const word = document.getElementById('search-input').value.trim().toLowerCase();
  const grid = document.getElementById('quiz-grid');
  const noResults = document.getElementById('no-results');
  const noResultsWord = document.getElementById('no-results-word');

  const allQuizzes = [...quizData, ...userQuizzes];
  const filtered = allQuizzes.filter(q => q.title.toLowerCase().includes(word));

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResultsWord.textContent = word;
    noResults.style.display = 'block';
  } else {
    noResults.style.display = 'none';
    grid.innerHTML = filtered.map(q => `
      <div class="quiz-card" onclick="startQuiz('${q.id}')">
        <div class="card-emoji">${q.emoji}</div>
        <div class="card-title">${q.title}</div>
        <div class="card-meta">${q.questions.length}問</div>
        <div class="card-badge ${q.difficulty}">${q.difficulty === 'easy' ? '初級' : q.difficulty === 'hard' ? '上級' : '中級'}</div>
      </div>
    `).join('');
  }
}

renderTop();
showPage('top');
loadUserQuizzes();
